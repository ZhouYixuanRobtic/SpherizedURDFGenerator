name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  source-hygiene:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Reject generated artifacts
        run: |
          set -e
          if git ls-files build build_dkr .codegraph python/__pycache__ python/tests/__pycache__ python/urdf_approx_geom/__pycache__ scripts/__pycache__ check_json.py check_json2.py | grep .; then
            echo "Generated artifacts are tracked; remove them from git."
            exit 1
          fi

      - name: Whitespace check
        run: |
          set -e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="${{ github.event.before }}"
          fi
          if git rev-parse --verify "$BASE_SHA^{commit}" >/dev/null 2>&1; then
            git diff --check "$BASE_SHA"..HEAD
          else
            git diff --check
          fi

  # GitHub forbids `secrets.*` directly in job `if:` conditionals. Read the
  # secrets in a step `env:` (allowed) and expose the boolean via job outputs,
  # then gate the downstream jobs on `needs.check-secrets.outputs.*`.
  check-secrets:
    runs-on: ubuntu-22.04
    outputs:
      has_registry: ${{ steps.check.outputs.has_registry }}
    steps:
      - id: check
        env:
          REGISTRY_USER: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          REGISTRY_PASS: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        run: |
          if [ -n "$REGISTRY_USER" ] && [ -n "$REGISTRY_PASS" ]; then
            echo "has_registry=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_registry=false" >> "$GITHUB_OUTPUT"
          fi

  docker-build-test:
    needs: check-secrets
    if: ${{ needs.check-secrets.outputs.has_registry == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: irmv-docker-hub-registry.cn-shanghai.cr.aliyuncs.com
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: docker build -t spherized-dev -f docker/Dockerfile .

      - name: Build and test
        run: |
          docker run --rm -v $PWD:/workspace spherized-dev bash -lc '
            set -e
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCOMPILE_URDFApproxGeom_PYBINDING=ON
            cmake --build build -j$(nproc)
            ./build/test/test_capsule --gtest_color=no
            ./build/test/test_spheretree --gtest_color=no
            PYTHONPATH=/workspace/python:/workspace/build/python python3 -m pytest python/tests -q
          '

  public-python-smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python package metadata
        run: |
          python -m pip install --upgrade pip setuptools pytest
          python -m pip install -e python --no-build-isolation

      - name: Run public CLI smoke tests
        run: |
          urdf-approx-geom --help
          urdf-approx-geom presets
          PYTHONPATH=$PWD/python python -m pytest python/tests/test_public_python_smoke.py -q

  docker-build-test-skipped:
    needs: check-secrets
    if: ${{ needs.check-secrets.outputs.has_registry != 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Explain skipped full build
        run: |
          echo "Skipping full Docker build because private registry credentials are not available."
          echo "The source-hygiene job still runs on every pull request."
