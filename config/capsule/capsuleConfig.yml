# Capsule approximation config (Wu2018 cross-section method).
# Pipeline: watertight mesh -> slice into cross-sections perpendicular to the
# link's PCA axis -> fit COA-minimized circles per section (Lloyd) -> link
# adjacent-section circles into capsules -> grow to cover -> emit
# <cylinder>+<sphere> URDF + JSON sidecar.

NSections: 4              # cross-section planes per link (more = tighter + more capsules).
CoaThreshold: 0.005       # Circle-Outside-Area (over-cover) target per section; a section
                          # splits into more circles until COA < this (lower = tighter/split).
MaxCirclesPerSection: 4   # ceiling on circles per section (wide links -> several capsules).
MaxCapsulesPerLink: 12    # soft ceiling on capsules per link (drops shortest if exceeded).
